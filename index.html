<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="spooky-mode">

    <!-- Stage 1: Boarding -->
    <div id="boarding-section" class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <p>Boarding Simulator</p>
                </div>
                <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Controls">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
            <div class="controls" id="sim-controls">
                <div class="action-buttons">
                    <button class="btn btn-danger" id="btn-reset">Reset</button>
                </div>
            </div>
        </aside>

        <main class="simulation-area">
            <div class="dashboard">
                <div class="stat-card">
                    <span class="stat-label">Progress</span>
                    <span class="stat-value" id="stat-boarded">0 / 40</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="stat-card controls-hint">
                    <span class="stat-label">Controls</span>
                    <span class="hint-text">← → 통로 이동 &nbsp;↑ ↓ 좌석 이동 &nbsp;Space 착석</span>
                </div>
            </div>

            <div class="plane-wrapper">
                <div class="plane-nose"></div>
                <div class="plane-body" id="plane-grid"></div>
                <div class="plane-tail"></div>
            </div>
        </main>

        <div class="legend">
            <div class="legend-item"><div class="blob empty-seat"></div> Empty Seat</div>
            <div class="legend-item"><div class="blob seated"></div> Seated</div>
            <div class="legend-item"><div class="blob moving"></div> Moving</div>
            <div class="legend-item"><div class="blob waiting"></div> Waiting</div>
        </div>
    </div>

    <!-- Stage 2a: Story Overlay -->
    <div id="story-overlay">
        <div class="story-content" id="story-content">
            <div class="story-emoji" id="story-emoji"></div>
            <div class="story-text" id="story-text"></div>
        </div>
    </div>

    <!-- Stage 2b: Crash Overlay -->
    <div id="crash-overlay">
        <div class="crash-content">
            <div class="crash-plane">✈️</div>
            <h2 class="crash-title">비행기가 추락하고 있습니다!</h2>
            <p class="crash-sub">탑승 완료 직후... 기체에 이상이 생겼습니다.</p>
        </div>
    </div>

    <!-- Stage 3: Battle -->
    <div id="battle-stage">
        <div id="battle-ui">
            <span id="enemy-hp">❤️ 100</span>
            <span id="power-ups"></span>
            <span id="battle-hint">← → 이동 &nbsp; Space: 🎃 발사</span>
            <span id="player-hp">💙 3</span>
        </div>
        <div id="battle-enemy" class="battle-char enemy-char"></div>
        <div id="battle-player" class="battle-char player-char"></div>

        <div id="victory-screen">
            <div class="end-screen-content">
                <div class="end-emoji">🎉</div>
                <h1>승리!</h1>
                <p>적을 무찔렀습니다!</p>
                <button class="btn btn-primary" id="btn-play-again">다시 하기</button>
            </div>
        </div>
        <div id="game-over-screen">
            <div class="end-screen-content">
                <div class="end-emoji">💀</div>
                <h1>패배...</h1>
                <p>적에게 쓰러졌습니다.</p>
                <button class="btn btn-primary" id="btn-retry">다시 하기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
