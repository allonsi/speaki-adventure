<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <p>Boarding Simulator</p>
                </div>
                <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Controls">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
            <div style="flex-grow: 1;" class="spacer"></div>            
            <div class="controls" id="sim-controls">
                <div class="control-group">
                    <label for="strategy-select">Boarding Strategy</label>
                    <select id="strategy-select">
                        <option value="random">Random</option>
                        <option value="b2f">Back-to-Front</option>
                        <option value="block">Block (21-30 &rarr; 11-20 &rarr; 1-10)</option>
                        <option value="wilma">Outside-In (Wilma)</option>
                        <option value="no-assigned">No Assigned Seats</option>
                        <option value="steffen">Steffen Method</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="baggage-prob">Baggage Probability</label>
                    <input type="range" id="baggage-prob" min="0" max="100" value="80">
                    <span class="range-value" id="baggage-prob-val">80%</span>
                </div>

                <div class="control-group">
                    <label for="baggage-time">Baggage Time (Ticks)</label>
                    <input type="range" id="baggage-time" min="0" max="10" value="3">
                    <span class="range-value" id="baggage-time-val">3</span> 
                </div>

                <div class="control-group">
                    <label for="sim-speed">Simulation Speed</label>
                    <input type="range" id="sim-speed" min="1" max="60" value="10">
                    <span class="range-value" id="sim-speed-val">10 TPS</span>
                </div>

                <div class="control-group" style="flex-direction: row; align-items: center; gap: 8px; margin-top: 8px;">
                    <input type="checkbox" id="spooky-mode" style="width: auto;">
                    <label for="spooky-mode" style="cursor: pointer; font-weight: 600; color: #f59e0b;">스피키 모드</label>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="btn-play">Start</button>
                    <button class="btn btn-secondary" id="btn-pause" disabled>Pause</button>
                    <button class="btn btn-danger" id="btn-reset">Reset</button>
                    <button class="btn btn-ghost" id="btn-manual">Manual Play</button>
                </div>
            </div>
        </aside>

        <main class="simulation-area">
            <div class="dashboard">
                <div class="stat-card"> 
                    <span class="stat-label">Total time (Ticks)</span>
                    <span class="stat-value" id="stat-ticks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Progress</span>
                    <span class="stat-value" id="stat-boarded">0 / 180</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">줄이 멈춘 시간 (Ticks)</span>
                    <span class="stat-value" id="stat-bottlenecks">0</span>
                </div>
            </div>

            <div class="plane-wrapper">
                <div class="plane-nose"></div>
                <div class="plane-body" id="plane-grid">
                    <!-- Grid generated by JS -->
                </div>
                <div class="plane-tail"></div>
            </div>
        </main>
        
        <div class="legend">
            <div class="legend-item"><div class="blob empty-seat"></div> Empty Seat</div>
            <div class="legend-item"><div class="blob seated"></div> Seated</div>
            <div class="legend-item"><div class="blob stowing"></div> Stowing baggage</div>
            <div class="legend-item"><div class="blob waiting"></div> Blocked by seats</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
